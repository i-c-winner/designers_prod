x-customizable-image: &customizable_image
  # By default the image used only contains the `frappe` and `erpnext` apps.
  # See https://github.com/frappe/frappe_docker/blob/main/docs/container-setup/02-build-setup.md#define-custom-apps
  # about using custom images.
  image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-$ERPNEXT_VERSION}
  pull_policy: ${PULL_POLICY:-always}
  restart: ${RESTART_POLICY:-unless-stopped}

x-depends-on-configurator: &depends_on_configurator
  depends_on:
    configurator:
      condition: service_completed_successfully

x-backend-defaults: &backend_defaults
  <<: [*depends_on_configurator, *customizable_image]
  environment:
    FRAPPE_DB_PASSWORD: ${DB_PASSWORD}
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - sites_assets:/home/frappe/frappe-bench/sites/assets
    - logs:/home/frappe/frappe-bench/logs

services:
  configurator:
    <<: *backend_defaults
#    platform: linux/amd64
    entrypoint:
      - bash
      - -c
    # add redis_socketio for backward compatibility
    command:
      - |
        set -e
        ls -1 apps > sites/apps.txt
        bench set-config -g db_host "$$DB_HOST"
        bench set-config -gp db_port "$$DB_PORT"
        bench set-config -g redis_cache "redis://$$REDIS_CACHE"
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE"
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE"
        bench set-config -gp socketio_port "$$SOCKETIO_PORT"
        bench set-config -g chromium_path /usr/bin/chromium-headless-shell
        if [ ! -f "sites/$$BOOTSTRAP_SITE_NAME/site_config.json" ]; then
          bench new-site "$$BOOTSTRAP_SITE_NAME" --mariadb-root-password "$$DB_ROOT_PASSWORD" --db-password "$$DB_PASSWORD" --mariadb-user-host-login-scope "$$DB_USER_HOST_LOGIN_SCOPE" --admin-password "$$ADMIN_PASSWORD"
          bench --site "$$BOOTSTRAP_SITE_NAME" install-app erpnext
          if [ -d apps/designers ]; then
            bench --site "$$BOOTSTRAP_SITE_NAME" install-app designers
          fi
        fi
        site_db_user=$$(jq -r '.db_user // .db_name // empty' "sites/$$BOOTSTRAP_SITE_NAME/site_config.json")
        site_db_name=$$(jq -r '.db_name // empty' "sites/$$BOOTSTRAP_SITE_NAME/site_config.json")
        if [ -n "$$site_db_user" ] && [ -n "$$site_db_name" ]; then
          # Always keep site_config aligned with .env password.
          bench --site "$$BOOTSTRAP_SITE_NAME" set-config db_password "$$DB_PASSWORD"
          # Try to sync MariaDB user password as well; don't crash bootstrap if root remote auth isn't available yet.
          if mariadb -h "$$DB_HOST" -P "$$DB_PORT" -u root -p"$$DB_ROOT_PASSWORD" -e "SELECT 1;" >/dev/null 2>&1; then
            mariadb -h "$$DB_HOST" -P "$$DB_PORT" -u root -p"$$DB_ROOT_PASSWORD" -e "CREATE USER IF NOT EXISTS '$$site_db_user'@'%' IDENTIFIED BY '$$DB_PASSWORD'; ALTER USER '$$site_db_user'@'%' IDENTIFIED BY '$$DB_PASSWORD'; GRANT ALL PRIVILEGES ON \`$$site_db_name\`.* TO '$$site_db_user'@'%'; FLUSH PRIVILEGES;"
          else
            echo "WARN: cannot connect to MariaDB as root from configurator; skipped DB user password sync."
          fi
        fi
        if [ -n "$$SITE_HOST_NAME" ]; then
          bench --site "$$BOOTSTRAP_SITE_NAME" set-config host_name "$$SITE_HOST_NAME"
        fi
        bench use "$$BOOTSTRAP_SITE_NAME"
    environment:
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-}
      REDIS_CACHE: ${REDIS_CACHE:-}
      REDIS_QUEUE: ${REDIS_QUEUE:-}
      SOCKETIO_PORT: 9000
      BOOTSTRAP_SITE_NAME: ${BOOTSTRAP_SITE_NAME:-ecklet}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_PASSWORD: ${DB_PASSWORD}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DB_USER_HOST_LOGIN_SCOPE: ${DB_USER_HOST_LOGIN_SCOPE:-%}
      SITE_HOST_NAME: ${SITE_HOST_NAME:-}
    depends_on: {}
    restart: on-failure

  backend:
    <<: *backend_defaults
#    platform: linux/amd64
    environment:
      FRAPPE_SITE_NAME_HEADER: ecklet

  frontend:
    <<: *customizable_image
#    platform: linux/amd64
    ports:
      - ${HTTP_PUBLISH_PORT:-8080}:8080
    command:
      - nginx-entrypoint.sh
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - sites_assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs
    depends_on:
      - backend
      - websocket

  websocket:
    <<: [*depends_on_configurator, *customizable_image]
#    platform: linux/amd64
    environment:
      FRAPPE_SITE_NAME_HEADER: ecklet
    command:
      - node
      - /home/frappe/frappe-bench/apps/frappe/socketio.js
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - sites_assets:/home/frappe/frappe-bench/sites/assets
      - logs:/home/frappe/frappe-bench/logs

  queue-short:
    <<: *backend_defaults
#    platform: linux/amd64
    command: bench worker --queue short,default

  queue-long:
    <<: *backend_defaults
#    platform: linux/amd64
    command: bench worker --queue long,default,short

  scheduler:
    <<: *backend_defaults
#    platform: linux/amd64
    command: bench schedule

# ERPNext requires local assets access (Frappe does not)
volumes:
  sites:
  sites_assets:
  logs:
